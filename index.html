<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parçacık Kalp Efekti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0008;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    canvas { display: block; max-width: 100%; }
    #inputWrap { margin-top: 14px; width: 380px; max-width: 90vw; }
    #textInput {
      width: 100%;
      background: #1a0f18;
      border: 1px solid #3a2838;
      border-radius: 24px;
      color: #fff;
      font-size: 15px;
      padding: 11px 22px;
      outline: none;
      text-align: center;
      letter-spacing: 1.5px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    #textInput:focus { border-color: #ff6eb0; }
    #textInput::placeholder { color: #5a3050; }
  </style>
</head>
<body>
  <canvas id="c" width="520" height="420"></canvas>
  <div id="inputWrap">
    <input id="textInput" type="text" placeholder="Bir şey yaz..." maxlength="14" />
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const COLORS = [
      ['#ff6eb0','#ff4d94','#ff88bb'],
      ['#ff8ec4','#ff5fa0','#ffaad4'],
      ['#cc3377','#ff4d94','#ff77aa'],
      ['#ff99cc','#ff66aa','#ffbbdd'],
      ['#ff55a3','#ff2288','#ff88c8'],
      ['#e0306a','#ff1177','#ff6699'],
    ];
    const MAX_P = 6000;

    let particles = [];
    let targetPositions = [];
    let mode = 'heart';
    const inputEl = document.getElementById('textInput');

    function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
    function heartY(t) { return -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)); }

    function getHeartPoints(n) {
      const pts = [];
      const cx = W/2, cy = H/2 - 10, scale = 13.5;
      for (let i = 0; i < n; i++) {
        const t = (i / n) * Math.PI * 2;
        pts.push({ x: cx + heartX(t) * scale, y: cy + heartY(t) * scale, bright: 128 });
      }
      return pts;
    }

    function get3DTextPoints(text, n) {
      const off = document.createElement('canvas');
      off.width = W; off.height = H;
      const oc = off.getContext('2d');

      const fsize = text.length <= 2 ? 160 : text.length <= 4 ? 130 : text.length <= 6 ? 105 : text.length <= 9 ? 82 : text.length <= 12 ? 66 : 54;

      // 3D shadow layers
      const depth = 8;
      for (let d = depth; d >= 1; d--) {
        oc.fillStyle = `rgba(120,20,60,${0.13 + (d/depth)*0.10})`;
        oc.font = `900 ${fsize}px Arial Black, Arial, sans-serif`;
        oc.textAlign = 'center';
        oc.textBaseline = 'middle';
        oc.fillText(text, W/2 + d*1.3, H/2 + d*1.2);
      }

      // Main face gradient
      const grad = oc.createLinearGradient(0, H/2 - fsize/2, 0, H/2 + fsize/2);
      grad.addColorStop(0, '#ffddee');
      grad.addColorStop(0.35, '#ff88cc');
      grad.addColorStop(1, '#bb1155');
      oc.fillStyle = grad;
      oc.font = `900 ${fsize}px Arial Black, Arial, sans-serif`;
      oc.textAlign = 'center';
      oc.textBaseline = 'middle';
      oc.fillText(text, W/2, H/2);

      // Highlight streak
      const hgrad = oc.createLinearGradient(0, H/2 - fsize/2, 0, H/2 - fsize/2 + fsize*0.38);
      hgrad.addColorStop(0, 'rgba(255,255,255,0.60)');
      hgrad.addColorStop(1, 'rgba(255,255,255,0)');
      oc.fillStyle = hgrad;
      oc.fillText(text, W/2, H/2);

      const data = oc.getImageData(0, 0, W, H).data;
      const pts = [];

      // Step=2 → çok daha sık örnekleme = net yazı
      for (let y = 0; y < H; y += 2)
        for (let x = 0; x < W; x += 2) {
          const i = (y * W + x) * 4;
          if (data[i+3] > 60) {
            const bright = (data[i] + data[i+1] + data[i+2]) / 3;
            pts.push({ x: x + (Math.random()-.5)*0.8, y: y + (Math.random()-.5)*0.8, bright });
          }
        }

      if (!pts.length) return getHeartPoints(n);
      while (pts.length < n) pts.push(pts[Math.floor(Math.random() * pts.length)]);
      return pts.sort(() => Math.random() - .5).slice(0, n);
    }

    function initParticles() {
      const hpts = getHeartPoints(MAX_P);
      particles = [];
      for (let i = 0; i < MAX_P; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 100 + 60;
        const cset = COLORS[Math.floor(Math.random() * COLORS.length)];
        particles.push({
          x: W/2 + Math.cos(a) * r,
          y: H/2 + Math.sin(a) * r,
          vx: 0, vy: 0,
          colors: cset,
          size: Math.random() * 1.0 + 0.3,
          alpha: Math.random() * 0.5 + 0.5,
          phase: Math.random() * Math.PI * 2,
          speed: 0.018 + Math.random() * 0.012,
        });
      }
      targetPositions = hpts;
    }

    function setTargetsHeart() {
      targetPositions = getHeartPoints(MAX_P);
      mode = 'heart';
    }

    function setTargetsText(text) {
      targetPositions = get3DTextPoints(text, MAX_P);
      mode = 'text';
    }

    let tick = 0, lastTime = 0;

    function animate(ts) {
      requestAnimationFrame(animate);
      if (ts - lastTime < 15) return;
      lastTime = ts;
      tick++;

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0a0008';
      ctx.fillRect(0, 0, W, H);

      for (let i = 0; i < MAX_P; i++) {
        const p = particles[i];
        const tgt = targetPositions[i];
        const dx = tgt.x - p.x, dy = tgt.y - p.y;
        p.vx += dx * 0.10; p.vy += dy * 0.10;
        p.vx *= 0.68; p.vy *= 0.68;
        p.x += p.vx; p.y += p.vy;

        const phase = p.phase + tick * p.speed;
        const cIdx = Math.floor(((Math.sin(phase) + 1) / 2) * p.colors.length);
        const col = p.colors[Math.min(cIdx, p.colors.length - 1)];

        const bright = tgt.bright || 128;

        // Parlak noktalara küçük beyaz highlight
        if (mode === 'text' && bright > 170) {
          ctx.globalAlpha = Math.min(1, p.alpha + 0.3);
          ctx.fillStyle = 'rgba(255,220,240,0.9)';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;

      if (mode === 'heart') {
        const g = ctx.createRadialGradient(W/2, H/2-10, 8, W/2, H/2-10, 160);
        g.addColorStop(0, 'rgba(255,80,150,0.08)');
        g.addColorStop(1, 'rgba(255,80,150,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }
    }

    let debTimer;
    inputEl.addEventListener('input', () => {
      const val = inputEl.value.trim();
      clearTimeout(debTimer);
      debTimer = setTimeout(() => {
        val.length === 0 ? setTargetsHeart() : setTargetsText(val);
      }, 350);
    });

    initParticles();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
